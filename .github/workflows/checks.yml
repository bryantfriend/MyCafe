name: MyCafe Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run checks and tests
        run: npm run build

      - name: Validate Firebase config JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('firebase.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Check functions syntax
        run: node --check firebase/functions/index.js
