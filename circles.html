<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCafe | Circles</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .bg-cream {
      background-color: #fefaf1;
    }
  </style>
</head>
<body class="bg-cream text-gray-800">

  <header class="bg-white shadow-md p-4 flex flex-wrap gap-3 justify-between items-center">
    <a href="index.html" class="text-xl font-bold text-green-800">🌟 Cafe Circles</a>
    <div class="flex items-center gap-3">
      <a href="create-circle.html" class="bg-yellow-600 text-white px-3 py-2 rounded hover:bg-yellow-700">Create Circle</a>
      <select id="languageSelector" class="border rounded px-2 py-1"></select>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-6 bg-cream">
    <section class="mb-6">
      <h1 class="text-3xl font-bold text-green-900">Elegant event listing</h1>
      <p class="text-gray-700">Join hosts for food, gifts, conversation, and community around the table.</p>
    </section>
    <div id="circlesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <script type="module" src="./js/circles.js"></script>
</body>
</html>
