<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyCafe Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#047857">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Admin specific layout */
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; padding: var(--space-4); }
    .admin-main { flex: 1; padding: var(--space-6); background: var(--bg-secondary); overflow-y: auto; height: 100vh; }
    .admin-nav-link { display: block; padding: var(--space-3); color: #cbd5e1; border-radius: var(--radius-sm); margin-bottom: var(--space-2); text-align: left; background: transparent; border: 0; width: 100%; cursor: pointer; transition: all var(--transition-fast); }
    .admin-nav-link:hover, .admin-nav-link.active { background: #1e293b; color: white; }
    .admin-mobile-topbar { display: none; background: #0f172a; color: white; padding: var(--space-4); justify-content: space-between; align-items: center; }
    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .admin-sidebar { display: none; width: 100%; position: fixed; inset: 0; z-index: 100; }
      .admin-sidebar.open { display: flex; }
      .admin-mobile-topbar { display: flex; }
      .admin-main { padding-top: var(--space-4); height: auto; }
    }
  </style>
</head>
<body>

  <div class="admin-layout">
    <header class="admin-mobile-topbar">
      <div style="font-weight: bold; font-size: 1.2rem;">☕ MyCafe Admin</div>
      <button id="mobileMenuToggle" style="background: transparent; border: 0; color: white; font-size: 1.5rem; cursor: pointer;">☰</button>
    </header>

    <aside id="sidebar" class="admin-sidebar">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
        <button id="navHome" style="background: transparent; border: 0; color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer; text-align: left;">☕ Admin Panel</button>
        <button id="mobileClose" style="display: none; background: transparent; border: 0; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>
      <nav style="flex: 1;">
        <button class="admin-nav-link navLink" id="navUsers">👥 Users</button>
        <button class="admin-nav-link navLink" id="navCafes">🏪 Cafes</button>
        <button class="admin-nav-link navLink" id="navReviews">📝 Reviews <span id="reviewAlert" style="margin-left: 8px;"></span></button>
        <button class="admin-nav-link navLink" id="navCircles">🪑 Cafe Circles</button>
      </nav>
      <div style="margin-top: auto;">
        <button id="logoutBtn" style="width: 100%; padding: var(--space-3); background: var(--color-danger); color: white; border: 0; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer;">🔒 Logout</button>
      </div>
    </aside>

    <main id="adminContent" class="admin-main">
      <!-- JS will inject content here -->
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: white; border-radius: var(--radius-lg); padding: var(--space-6); width: 100%; max-width: 500px; position: relative; box-shadow: var(--shadow-float);">
      <button id="modalCloseBtn" style="position: absolute; top: var(--space-4); right: var(--space-4); background: transparent; border: 0; font-size: 1.5rem; cursor: pointer;">&times;</button>
      <h3 id="modalTitle" style="font-size: 1.25rem; font-weight: bold; margin-bottom: var(--space-4);"></h3>
      <div id="modalBody" style="display: grid; gap: var(--space-3);">
        <input id="modalNickname" type="text" placeholder="Nickname" style="width: 100%;" />
        <input id="modalEmail" type="email" placeholder="Email" style="width: 100%;" />
        <select id="modalRole" style="width: 100%;">
          <option value="user">User</option>
          <option value="cafeOwner">Cafe Owner</option>
          <option value="circleHost">Circle Host</option>
          <option value="admin">Admin</option>
        </select>
        <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
          <input type="checkbox" id="modalFlagged" /> Temporarily Banned
        </label>
        <textarea id="modalAdminNotes" placeholder="Internal admin notes" style="width: 100%; min-height: 80px;"></textarea>
        <div style="display: grid; gap: var(--space-2);">
          <input id="modalAssignBadge" type="text" placeholder="Assign badge ID" style="width: 100%;" />
          <button id="modalPasswordResetBtn" type="button" style="background: var(--color-warning); color: white; padding: var(--space-2); border: 0; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold;">Send password reset</button>
        </div>
        <details style="background: var(--bg-secondary); padding: var(--space-3); border-radius: var(--radius-sm);">
          <summary style="cursor: pointer; font-weight: bold;">Moderator tools</summary>
          <div id="modalModerationTools" style="font-size: 0.9rem; color: var(--text-secondary); margin-top: var(--space-2);">Open a user to load reviews and photos.</div>
        </details>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
          <div>📅 Created: <span id="modalCreatedAt">-</span></div>
          <div>⏱️ Last Login: <span id="modalLastLogin">-</span></div>
          <div>🏅 Badges: <span id="modalBadgeCount">0</span></div>
          <div>📝 Reviews: <span id="modalReviewCount">0</span></div>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end; margin-top: var(--space-6);">
        <button id="modalSaveBtn" class="primary-link">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="/admin/adminPanel.js" defer></script>
</body>
</html>
