<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patisserie Pile-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Marcellus&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #2a1b19;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #game-mount {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .font-header {
            font-family: 'Marcellus', serif;
        }

        /* Shared Platform Styles */
        :root {
            --wood-light: #8D6E63;
            --wood-medium: #5D4037;
            --wood-dark: #3E2723;
            --parchment: #FDF6F0;
            --sienna: #A0522D;
        }

        .wooden-sign {
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-medium));
            border: 4px solid var(--wood-dark);
            border-radius: 1rem;
            padding: 1.25rem 3rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.2);
            position: relative;
            display: inline-block;
        }

        .wooden-sign::before,
        .wooden-sign::after {
            content: '';
            position: absolute;
            top: -30px;
            width: 6px;
            height: 30px;
            background: #444;
            border-radius: 4px;
        }

        .wooden-sign::before {
            left: 20%;
        }

        .wooden-sign::after {
            right: 20%;
        }

        .menu-panel {
            background: var(--parchment);
            border: 2px solid var(--sienna);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .wood-btn {
            background: linear-gradient(to bottom, #795548, #5D4037);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 800;
            box-shadow: 0 4px 0 #3E2723;
            transition: all 0.1s;
        }

        .wood-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3E2723;
        }
    </style>
</head>

<body class="overflow-hidden">
    <div id="game-mount"></div>

    <script type="module">
        import CakeTower from './CakeTower.js';

        document.addEventListener('DOMContentLoaded', () => {
            const game = new CakeTower();
            game.init();
        });
    </script>
</body>

</html>
