<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Marcellus&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --wood-light: #8D6E63;
            --wood-medium: #5D4037;
            --wood-dark: #3E2723;
            --parchment: #FDF6F0;
            --parchment-dark: #EAE0D5;
            --sienna: #A0522D;
            --coffee: #6F4E37;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #2a1b19 radial-gradient(circle at center, #5D4037 0%, #2a1b19 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .font-header {
            font-family: 'Marcellus', serif;
        }

        /* Wooden Sign Header Overwrite */
        .wooden-sign {
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-medium));
            border: 4px solid var(--wood-dark);
            border-radius: 1rem;
            padding: 1.5rem 4rem;
            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.5),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        /* Hanging chains effect */
        .wooden-sign::before,
        .wooden-sign::after {
            content: '';
            position: absolute;
            top: -40px;
            width: 8px;
            height: 40px;
            background: #444;
            border-radius: 4px;
        }

        .wooden-sign::before {
            left: 20%;
        }

        .wooden-sign::after {
            right: 20%;
        }

        /* Parchment Board */
        .ttt-board-container {
            background: var(--parchment);
            border: 12px solid var(--wood-medium);
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow:
                0 30px 60px -12px rgba(0, 0, 0, 0.4),
                inset 0 0 100px rgba(111, 78, 55, 0.1);
            position: relative;
        }

        .ttt-cell {
            border: 1px solid rgba(111, 78, 55, 0.2);
            transition: all 0.3s ease;
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ttt-cell:hover {
            background-color: rgba(111, 78, 55, 0.05);
        }

        /* Icon Container to prevent layout shifts */
        .symbol-container {
            width: 75%;
            height: 75%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Emphasize Grid */
        .ttt-cell:nth-child(3n+1),
        .ttt-cell:nth-child(3n+2) {
            border-right: 2px solid rgba(111, 78, 55, 0.3);
        }

        .ttt-cell:nth-child(-n+6) {
            border-bottom: 2px solid rgba(111, 78, 55, 0.3);
        }

        /* Stylized Symbols */
        .x-symbol path,
        .o-symbol path {
            stroke-width: 3.5;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
        }

        /* Vintage Menu Panel */
        .menu-panel {
            background: var(--parchment);
            background-image: radial-gradient(circle at 10% 10%, rgba(111, 78, 55, 0.05) 0%, transparent 50%);
            border: 2px solid var(--sienna);
            border-radius: 2rem;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Flourished corners */
        .menu-panel::before {
            content: '❧';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 2rem;
            color: var(--sienna);
            opacity: 0.4;
        }

        .menu-panel::after {
            content: '❧';
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 2rem;
            color: var(--sienna);
            transform: rotate(180deg);
            opacity: 0.4;
        }

        /* Custom Wooden Button */
        .wood-btn {
            background: linear-gradient(to bottom, #795548, #5D4037);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 800;
            padding: 1.25rem;
            box-shadow: 0 4px 0 #3E2723;
            transition: all 0.1s;
        }

        .wood-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3E2723;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%236F4E37%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2em;
        }
    </style>
</head>

<body class="bg-stone-50 overflow-x-hidden">
    <div id="game-mount"></div>

    <script type="module">
        import TicTacToe from './TicTacToe.js';

        document.addEventListener('DOMContentLoaded', () => {
            const game = new TicTacToe();
            game.init();
        });
    </script>
</body>

</html>
