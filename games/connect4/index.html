<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 - Cafe Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --wood: #4E342E;
            --wood-dark: #3E2723;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #F3E9DD;
        }

        /* Tactical Game Board Styles */
        .table-surface {
            background: radial-gradient(circle at center, #D3A26A 0%, #C6935C 100%);
            border-radius: 3rem;
            padding: 3rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.3), inset 0 2px 10px rgba(255, 255, 255, 0.2);
            border-bottom: 15px solid #A67C52;
            width: 100%;
            max-width: 1100px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: var(--wood);
            border: 14px solid var(--wood-dark);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.6), inset 0 4px 12px rgba(255, 255, 255, 0.1);
            width: 100%;
            aspect-ratio: 7 / 6;
            position: relative;
        }

        .cell {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: #2a1b19;
            border-radius: 50%;
            margin: 6px;
            cursor: pointer;
            box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.8);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cell:hover {
            transform: scale(1.04);
            background: #3a2b29;
            box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.8), 0 0 25px rgba(211, 162, 106, 0.4);
        }

        .board-piece {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            transform: scale(0.92);
            z-index: 2;
        }

        .indicator-piece {
            width: 1.5rem;
            height: 1.5rem;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.75rem;
            border-radius: 50%;
        }

        .piece-coffee {
            background: radial-gradient(circle at 35% 35%, #D7CCC8 0%, #A1887F 40%, #795548 85%, #5D4037 100%);
            box-shadow: inset 0 -6px 8px rgba(0, 0, 0, 0.5), inset 0 6px 10px rgba(255, 255, 255, 0.4), 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .piece-cream {
            background: radial-gradient(circle at 35% 35%, #FFFFFF 0%, #F5F5F5 40%, #E2E2E2 85%, #BDBDBD 100%);
            box-shadow: inset 0 -6px 8px rgba(0, 0, 0, 0.2), inset 0 6px 10px rgba(255, 255, 255, 0.8), 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .piece-fall {
            animation: dropBounce 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes dropBounce {
            0% {
                transform: translateY(-600%) scale(0.92);
                opacity: 0;
            }

            60% {
                transform: translateY(0) scale(0.92);
                opacity: 1;
            }

            75% {
                transform: translateY(-12%) scale(0.96, 0.88);
            }

            85% {
                transform: translateY(0) scale(1.02, 0.94);
            }

            95% {
                transform: translateY(-4%) scale(0.98, 0.98);
            }

            100% {
                transform: translateY(0) scale(0.92);
            }
        }

        .winning-piece {
            animation: winnerPulse 0.8s infinite alternate;
            z-index: 10 !important;
            box-shadow: 0 0 50px #FFC107, inset 0 0 20px rgba(255, 255, 255, 0.8) !important;
            border: 4px solid #FFC107 !important;
        }

        @keyframes winnerPulse {
            from {
                transform: scale(0.92);
                filter: brightness(1);
            }

            to {
                transform: scale(1.1);
                filter: brightness(1.3);
            }
        }
    </style>
</head>

<body class="bg-stone-50 overflow-x-hidden">
    <div id="game-mount"></div>

    <script type="module">
        import Connect4 from './Connect4.js';

        document.addEventListener('DOMContentLoaded', () => {
            const game = new Connect4();
            game.init();
        });
    </script>
</body>

</html>
