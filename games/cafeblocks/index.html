<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Blocks - Patisserie Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Marcellus&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #2a1b19;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #game-mount {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .font-header {
            font-family: 'Marcellus', serif;
        }

        .font-vintage {
            font-family: 'Playfair Display', serif;
        }

        /* Café Theme Base Styles */
        :root {
            --latte-cream: #FDF6F0;
            --mocha-brown: #4A2C2A;
            --caramel-gold: #D4A373;
            --espresso-dark: #2a1b19;
            --matcha-green: #A3B18A;
            --steamer-white: rgba(255, 255, 255, 0.8);
        }

        .cafe-bg {
            background: linear-gradient(rgba(42, 27, 25, 0.85), rgba(42, 27, 25, 0.85)),
                url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        /* Grid Styling */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: #3E2723;
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5), 0 -10px 30px rgba(0, 0, 0, 0.3);
            /* Shadow moved 'above' */
            border: 8px solid #4A2C2A;
            width: 100%;
            max-width: 500px;
        }

        .grid-cell {
            aspect-ratio: 1/1;
            background: #5D4037;
            border-radius: 4px;
            position: relative;
            transition: background 0.2s ease;
        }

        .grid-cell.occupied {
            background: var(--caramel-gold);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .grid-cell.preview-valid {
            background: rgba(212, 163, 115, 0.3);
        }

        .grid-cell.preview-invalid {
            background: rgba(231, 111, 81, 0.3);
        }

        /* Block Tray */
        .block-tray {
            background: rgba(42, 27, 25, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px 20px 0 0;
            border-top: 4px solid var(--caramel-gold);
            padding: 20px;
        }

        .tray-slot {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tray-slot:active {
            cursor: grabbing;
        }

        .tray-slot.dragging {
            opacity: 0.5;
            transform: scale(0.8);
        }

        /* Animations */
        @keyframes steam-fade {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translateY(-30px) scale(1.5);
                opacity: 0;
            }
        }

        .steam-particle {
            position: absolute;
            background: radial-gradient(circle, white 0%, transparent 70%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: steam-fade 0.8s ease-out forwards;
        }

        .wooden-panel {
            background: #4A2C2A;
            border: 3px solid #D4A373;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.4);
            /* Shadow moved 'above' */
            color: #FDF6F0;
        }

        /* Mobile specific overrides */
        @media (max-width: 640px) {
            #cafe-blocks-container {
                padding: 10px !important;
            }

            .game-grid {
                max-width: 98vw !important;
                gap: 2px !important;
                padding: 4px !important;
                border: 4px solid #4A2C2A !important;
            }

            .grid-cell {
                border-radius: 2px !important;
            }

            .block-piece {
                transform: scale(0.8);
            }

            .tray-slot {
                width: 70px !important;
                height: 70px !important;
            }

            #cafe-blocks-container {
                justify-content: center !important;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="game-mount" class="cafe-bg">
        <!-- Content injected by CafeBlocks.js -->
    </div>

    <script type="module">
        import CafeBlocks from './CafeBlocks.js';
        window.game = new CafeBlocks();
        window.game.init();
    </script>
</body>

</html>
