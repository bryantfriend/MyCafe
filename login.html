<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – MyCafe</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-yellow-50 flex items-center justify-center h-screen">

  <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-2 text-center">☕ MyCafe Login</h1>
    <p class="text-sm text-gray-600 text-center mb-6">Users, cafe owners, hosts, and admins</p>

    <form id="loginForm" class="space-y-4">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required class="w-full border px-4 py-2 rounded" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required class="w-full border px-4 py-2 rounded" />
      <button id="loginBtn" type="submit" class="w-full bg-orange-500 text-white py-2 px-4 rounded shadow hover:bg-orange-600 flex justify-center items-center gap-2 disabled:opacity-60">
          🔐 <span>Log In</span>
        </button>
      <p id="errorMsg" class="text-red-600 text-sm text-center mt-2 hidden" aria-live="polite"></p>
      <p class="text-sm text-center text-gray-600">New here? <a href="register.html" class="text-orange-700 underline">Create a user account</a></p>
    </form>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
