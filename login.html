<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – MyCafe</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#047857">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-secondary); margin: 0; padding: var(--space-4);">

  <div style="background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-xl); box-shadow: var(--shadow-float); padding: var(--space-8); width: 100%; max-width: 400px; animation: fadeIn var(--transition-spring);">
    <div style="text-align: center; margin-bottom: var(--space-6);">
      <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text-primary); margin: 0 0 var(--space-2); letter-spacing: -0.02em;">☕ MyCafe Login</h1>
      <p style="color: var(--text-secondary); font-size: 0.95rem; margin: 0;">Users, cafe owners, hosts, and admins</p>
    </div>

    <form id="loginForm" style="display: grid; gap: var(--space-4);">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required style="padding: 14px; font-size: 1rem;" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required style="padding: 14px; font-size: 1rem;" />
      
      <button id="loginBtn" type="submit" class="primary-link" style="width: 100%; padding: 14px; font-size: 1.05rem; margin-top: var(--space-2);">
          🔐 <span style="margin-left: 8px;">Log In</span>
      </button>
      
      <p id="errorMsg" class="hidden" aria-live="polite" style="color: var(--color-danger); background: var(--color-danger-light); padding: var(--space-3); border-radius: var(--radius-sm); text-align: center; font-size: 0.9rem; font-weight: 600; margin: 0;"></p>
      
      <p style="text-align: center; font-size: 0.95rem; color: var(--text-secondary); margin-top: var(--space-4);">
        New here? <a href="register.html" style="color: var(--color-brand); font-weight: 600;">Create a user account</a>
      </p>
    </form>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
